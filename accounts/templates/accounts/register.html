<!DOCTYPE html>
<html>
<head>
    <title>Register - Sustainable Living</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, rgba(44,62,80,0.9), rgba(46,204,113,0.8)),
                        url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1948&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
        }

        .register-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 2.8rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(46, 204, 113, 0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-dark);
            letter-spacing: -0.5px;
        }
        .logo span {
            color: #2ecc71;
        }

        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 1.8rem;
            font-size: 2rem;
            font-weight: 600;
            position: relative;
        }

        h2:after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: #2ecc71;
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 5px;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group i {
            color: #2ecc71;
            margin-right: 8px;
            width: 20px;
        }

        input {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #e9ecef;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #2ecc71;
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1);
        }

        input::placeholder {
            color: #a0aec0;
            font-size: 0.95rem;
        }

        .error {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 12px 18px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            border-left: 4px solid #dc2626;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error i {
            color: #dc2626;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 1.5rem 0 1rem;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        button:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 2px solid #e9ecef;
        }

        .login-link a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .login-link a:hover {
            color: #2ecc71;
        }

        .login-link a i {
            transition: transform 0.3s ease;
        }

        .login-link a:hover i {
            transform: translateX(5px);
        }

        .leaf-decoration {
            position: absolute;
            top: 20px;
            right: 20px;
            opacity: 0.1;
            font-size: 5rem;
            transform: rotate(15deg);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .register-box {
                padding: 2rem 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            h2 {
                font-size: 1.8rem;
            }
        }

        /* Password strength indicator (optional visual) */
        .password-hint {
            font-size: 0.8rem;
            color: #718096;
            margin-top: 5px;
        }
    </style>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <div class="logo-section">
                <div class="logo">Change<span> by Degrees</span></div>
            </div>

            <h2>Create Account</h2>
            <i class="fas fa-leaf leaf-decoration"></i>

            {% if error %}
                <div class="error">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <!-- First Row: First Name & Last Name -->
                <div class="form-row">
                    <div class="form-group">
                        <label>
                            <i class="fas fa-user"></i>First Name
                        </label>
                        <input type="text" name="first_name" placeholder="John" required>
                    </div>

                    <div class="form-group">
                        <label>
                            <i class="fas fa-user"></i>Last Name
                        </label>
                        <input type="text" name="last_name" placeholder="Doe" required>
                    </div>
                </div>

                <!-- Second Row: Email & Phone -->
                <div class="form-row">
                    <div class="form-group">
                        <label>
                            <i class="fas fa-envelope"></i>Email
                        </label>
                        <input type="email" name="email" placeholder="john@example.com" required>
                    </div>

                    <div class="form-group">
                        <label>
                            <i class="fas fa-phone"></i>Phone Number
                        </label>
                        <input type="tel" name="phone" placeholder="+1 234 567 8900" required>
                    </div>
                </div>

                <!-- Third Row: City & Username -->
                <div class="form-row">
                    <div class="form-group">
                        <label>
                            <i class="fas fa-city"></i>City
                        </label>
                        <input type="text" name="city" placeholder="New York" required>
                    </div>

                    <div class="form-group">
                        <label>
                            <i class="fas fa-at"></i>Username
                        </label>
                        <input type="text" name="username" placeholder="johndoe123" required>
                    </div>
                </div>

                <!-- Password Field (Full Width) -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>Password
                    </label>
                    <input type="password" name="password" placeholder="••••••••" required>
                    <div class="password-hint">
                        <i class="fas fa-info-circle"></i> Use at least 8 characters with letters & numbers
                    </div>
                </div>

                <!-- Confirm Password Field (Optional but recommended) -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>Confirm Password
                    </label>
                    <input type="password" name="confirm_password" placeholder="••••••••" required>
                </div>

                <button type="submit">
                    <i class="fas fa-leaf"></i> Register & Join Movement
                </button>

                <div class="login-link">
                    <a href="{% url 'login' %}">
                        Already have an account? <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Optional: Add password match validation -->
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.querySelector('input[name="password"]').value;
            const confirm = document.querySelector('input[name="confirm_password"]').value;

            if (password !== confirm) {
                e.preventDefault();
                alert('Passwords do not match!');
            }
        });
    </script>
</body>
</html>
