<!DOCTYPE html>
<html>
<head>
    <title>Login - Sustainable Living</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, rgba(44,62,80,0.9), rgba(46,204,113,0.8)),
                        url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1948&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(46, 204, 113, 0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: #2ecc71;
        }

        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 1.8rem;
            font-size: 1.8rem;
            font-weight: 600;
            position: relative;
        }

        h2:after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: #2ecc71;
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group i {
            color: #2ecc71;
            margin-right: 8px;
            width: 20px;
        }

        input {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #e9ecef;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #2ecc71;
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1);
        }

        input::placeholder {
            color: #a0aec0;
            font-size: 0.95rem;
        }

        .error {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 12px 18px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            border-left: 4px solid #dc2626;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error i {
            color: #dc2626;
        }

        .success {
            background-color: #dcfce7;
            color: #166534;
            padding: 12px 18px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            border-left: 4px solid #2ecc71;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .success i {
            color: #2ecc71;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 1.5rem 0 1rem;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        button:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .register-link {
            text-align: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #e9ecef;
        }

        .register-link a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .register-link a:hover {
            color: #2ecc71;
        }

        .register-link a i {
            transition: transform 0.3s ease;
        }

        .register-link a:hover i {
            transform: translateX(5px);
        }

        .forgot-password {
            text-align: right;
            margin-top: 5px;
        }

        .forgot-password a {
            color: #718096;
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #2ecc71;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-box {
                padding: 2rem 1.5rem;
            }

            h2 {
                font-size: 1.6rem;
            }
        }
    </style>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <div class="logo">Change<span> by Degrees</span></div>
            </div>

            <h2>Welcome Back</h2>

            <!-- Display success message from registration -->
            {% if messages %}
                {% for message in messages %}
                    <div class="success">
                        <i class="fas fa-check-circle"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Display error message if login fails -->
            {% if error %}
                <div class="error">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <!-- Username Field -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i>Username
                    </label>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>Password
                    </label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>

                <!-- Forgot Password Link (Optional) -->
                <div class="forgot-password">
                    <a href="#"><i class="fas fa-question-circle"></i> Forgot Password?</a>
                </div>

                <button type="submit">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>

                <div class="register-link">
                    <a href="{% url 'register' %}">
                        Don't have an account? Register <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
